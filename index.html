<!-- SLIDER -->
<section class="container mx-auto px-4 mt-6"

x-data="{
activeSlide:1,
slides:[
'banner1.png',
'https://images.unsplash.com/photo-1542751371-adc38448a05e?w=1200&q=80',
'https://images.unsplash.com/photo-1511512578047-dfb367046420?w=1200&q=80'
]
}"

x-init="setInterval(()=>{
activeSlide = activeSlide >= slides.length ? 1 : activeSlide + 1
},7000)"

>

<div class="relative overflow-hidden rounded-3xl aspect-[21/7] shadow-xl bg-slate-800">

<template x-for="(slide,index) in slides" :key="index">

<div x-show="activeSlide === index + 1" x-cloak class="absolute inset-0">

<img :src="slide" class="w-full h-full object-cover">

</div>

</template>

<div class="absolute bottom-4 left-0 right-0 flex justify-center gap-2">

<template x-for="i in slides.length">

<button
@click="activeSlide=i"
:class="activeSlide===i ? 'bg-blue-500 w-6' : 'bg-white/50 w-2'"
class="h-2 rounded-full transition-all"></button>

</template>

</div>

</div>

</section>
