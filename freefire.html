<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banned Notification</title>
    <style>
        /* Menghapus spasi default browser */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            overflow: hidden; /* Menghilangkan scrollbar */
            display: flex; /* Menggunakan flexbox untuk penempatan */
            justify-content: center; /* Menengahkan secara horizontal */
            align-items: center; /* Menengahkan secara vertikal */
            font-family: Arial, sans-serif; /* Menggunakan font sans-serif default */
        }

        .background {
            /* Menggunakan link gambar yang kamu berikan */
            background-image: url('https://i.pinimg.com/736x/b1/85/04/b1850465bd6924a070c94ac980cbd240.jpg');
            
            /* Mengatur agar gambar menutupi seluruh layar */
            background-size: cover;
            
            /* Memastikan posisi gambar tetap di tengah */
            background-position: center;
            
            /* Mengunci posisi agar tidak berulang */
            background-repeat: no-repeat;
            
            /* Mengatur dimensi sesuai ukuran layar (Viewport) */
            width: 100vw;
            height: 100vh;
            
            /* Memastikan posisi di belakang teks */
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
        }

        .text {
            color: #8B0000; /* Merah darah */
            font-size: 3em; /* Ukuran teks yang cukup besar */
            font-weight: bold; /* Teks tebal */
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5); /* Shadow teks agar lebih terbaca */
        }
    </style>
</head>
<body>

    <div class="background"></div>
    <div class="text">KAMU SUDAH DIBAN OLEH @ADENF9</div>

</body>
</html>
